steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install flet akshare pandas requests

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: 'stable'

  - name: Accept Android Licenses
    run: yes | sdkmanager --licenses || true

  - name: Build APK
    run: |
      # 编译 APK
      flet build apk --project-name "geek_stock" --product "极客股票终端"

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: stock-app-apk
      path: build/apk/*.apk

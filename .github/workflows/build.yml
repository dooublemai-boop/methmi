name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet akshare pandas requests

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # 自动接受 Android 许可协议
          yes | sdkmanager --licenses || true
          # 开始构建 APK
          flet build apk --project-name "geek_stock" --product "极客股票终端"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-app-apk
          path: build/apk/*.apk
